---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: r-switch-portal-backend
  namespace: bscao
  labels:
    app: r-switch-portal-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: r-switch-portal-backend
  template:
    metadata:
      labels:
        app: r-switch-portal-backend
    spec:
      containers:
        - name: r-switch-portal-backend
          image: your-docker-registry/r-switch-backend:latest
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: KAFKA_BROKER
              value: "kafka.bscao.svc.cluster.local:9092"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: r-switch-secrets
                  key: db-host
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: r-switch-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: r-switch-secrets
                  key: db-password
            - name: DB_NAME
              value: "rswitch"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: r-switch-secrets
                  key: jwt-secret
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: r-switch-portal-backend
  namespace: bscao
spec:
  selector:
    app: r-switch-portal-backend
  ports:
    - port: 4000
      targetPort: 4000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: r-switch-portal-backend
  namespace: bscao
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: switch-api.mojaloop.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: r-switch-portal-backend
                port:
                  number: 4000
---
apiVersion: v1
kind: Secret
metadata:
  name: r-switch-secrets
  namespace: bscao
type: Opaque
stringData:
  db-host: "your-mysql-host"
  db-user: "your-mysql-user"
  db-password: "your-mysql-password"
  jwt-secret: "your-super-secret-jwt-key-change-this"
